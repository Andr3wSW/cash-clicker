<!DOCTYPE html>
<html>
<head>
    <title>Cash Clicker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

    <div id="sidebar">
        <h2>Money Menu</h2>

        <button class="tabBtn" data-tab="clicker">💰 Clicker</button>
        <button class="tabBtn" data-tab="casino">🎰 Casino</button>
        <button class="tabBtn" data-tab="stocks">📈 Stocks</button>
        <button class="tabBtn" data-tab="duels">⚔️ Duels</button>
        <button class="tabBtn" data-tab="leaderboards">🏆 Leaderboards</button>
    </div>

    <div id="content">

        <div class="tab active" id="clicker">

            <h1>Cash Clicker</h1>

            <div id="money">$0</div>

            <h2 id="coinTier">Copper Tier 1</h2>

            <div id="coinContainer">
                <div id="coin">¢</div>
            </div>

            <button id="upgradeBtn">
                Upgrade Coin ($10)
            </button>
        </div>

        <div class="tab" id="casino">
            <h1>Casino</h1>
            <p>Coming Soon</p>
        </div>

        <div class="tab" id="stocks">
            <h1>Stocks</h1>
            <p>Coming Soon</p>
        </div>

        <div class="tab" id="duels">
            <h1>Duels</h1>
            <p>Coming Soon</p>
        </div>

        <div class="tab" id="leaderboards">
            <h1>Leaderboards</h1>
            <p>Coming Soon</p>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
