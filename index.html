<!DOCTYPE html>
<html>
<head>
    <title>Cash Clicker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="moneyRain"></div>

<div id="app">

    <div id="sidebar">
        <h2>Money Menu</h2>

        <button class="tabBtn" data-tab="clicker">💰 Clicker</button>
        <button class="tabBtn" data-tab="casino">🎰 Casino</button>
        <button class="tabBtn" data-tab="stocks">📈 Stocks</button>
        <button class="tabBtn" data-tab="duels">⚔️ Duels</button>
        <button class="tabBtn" data-tab="leaderboards">🏆 Leaderboards</button>
    </div>

    <div id="content">

        <div class="tab active" id="clicker">

            <h1>Cash Clicker</h1>

            <div id="money">$0</div>

            <h2 id="coinTier">Copper Tier 1</h2>

            <div id="coinContainer">
                <div id="coin">¢</div>
            </div>

            <button id="upgradeBtn">
                Upgrade Coin ($10)
            </button>
        </div>

       <div class="tab" id="casino">

            <div id="casinoMenu">
        
                <h1>🎰 Casino</h1>
        
                <button class="casinoSelect" data-game="coinflip">🪙 Coin Flip</button>
                <button class="casinoSelect" data-game="dice">🎲 Dice</button>
                <button class="casinoSelect" data-game="slots">🎰 Slots</button>
                <button class="casinoSelect" data-game="blackjack">🃏 Blackjack</button>
        
            </div>
        
            <div id="casinoGameView" style="display:none;">
        
                <button id="backCasino">← Back</button>
        
                <div id="gameContent"></div>
        
            </div>
        
        </div>
        
            <hr>
        
            <div class="casinoGame">
        
                <h2>Slots</h2>
        
                <input id="slotBet" type="number" min="1" value="10">
        
                <button id="spinSlots">
                    Spin
                </button>
        
                <p id="slotResult"></p>
        
            </div>
        
            <hr>
        
            <div class="casinoGame">
        
                <h2>Blackjack</h2>
        
                <input id="bjBet" type="number" min="1" value="10">
        
                <button id="playBJ">
                    Deal
                </button>
        
                <p id="bjResult"></p>
        
            </div>
        
        </div>

        <div class="tab" id="stocks">
            <h1>Stocks</h1>
            <p>Coming Soon</p>
        </div>

        <div class="tab" id="duels">
            <h1>Duels</h1>
            <p>Coming Soon</p>
        </div>

        <div class="tab" id="leaderboards">
            <h1>Leaderboards</h1>
            <p>Coming Soon</p>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
